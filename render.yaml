services:
  - type: web
    name: crowdcode-backend
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: crowdcode-mcp
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: HOST
        value: 0.0.0.0
      - key: MCP_ALLOWED_HOSTS
        value: crowdcode-backend.onrender.com,crowdcode.app,www.crowdcode.app,127.0.0.1:*,localhost:*
      - key: MCP_ALLOWED_ORIGINS
        value: https://crowdcode.app,https://www.crowdcode.app,http://127.0.0.1:*,http://localhost:*
      - key: CORS_ORIGINS
        value: https://crowdcode.app,https://www.crowdcode.app,http://127.0.0.1:5173,http://localhost:5173
      - key: CROWDCODE_REQUESTS_TABLE
        value: service_requests
      - key: PROJECT_IDEAS_CACHE_SECONDS
        value: "86400"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: CROWDCODE_REVIEWER_SALT
        sync: false
      # Redaction sidecar (server-side enforcement backstop). Point at the
      # crowdcode-redactor private service; leave unset to disable enforcement.
      - key: REDACTOR_URL
        sync: false
      - key: REDACTOR_TOKEN
        sync: false

  # Internal-only redaction sidecar: same Rampart + secret-recognizer
  # pipeline as crowdcode-mcp, called by the backend on ingest/egress.
  - type: pserv
    name: crowdcode-redactor
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w @crowdcode/redaction
    startCommand: node services/redactor/server.mjs
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: CROWDCODE_CACHE_DIR
        value: /opt/render/project/.cache/crowdcode-redactor
      - key: REDACTOR_TOKEN
        sync: false

  - type: static
    name: crowdcode-frontend
    buildCommand: ""
    staticPublishPath: frontend
